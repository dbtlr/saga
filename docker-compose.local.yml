services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: saga
      POSTGRES_PASSWORD: saga
      POSTGRES_USER: saga
    ports:
      - "55433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saga -d saga"]
      interval: 2s
      timeout: 5s
      retries: 20
    volumes:
      - saga-db-local-data:/var/lib/postgresql/data

volumes:
  saga-db-local-data:
