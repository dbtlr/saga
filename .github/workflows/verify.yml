name: Verify

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    env:
      CI: "true"
      TURBO_TELEMETRY_DISABLED: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          cache: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run verification gate
        run: pnpm run verify

  postgres-integration:
    name: Postgres Integration
    runs-on: ubuntu-latest
    env:
      CI: "true"
      SAGA_TEST_DATABASE_URL: postgres://saga:saga@localhost:5432/saga
      TURBO_TELEMETRY_DISABLED: "1"
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: saga
          POSTGRES_PASSWORD: saga
          POSTGRES_USER: saga
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U saga -d saga"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          cache: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Postgres integration gate
        run: pnpm run verify:integration
