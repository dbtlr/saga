services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: saga_test
      POSTGRES_PASSWORD: saga
      POSTGRES_USER: saga
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saga -d saga_test"]
      interval: 2s
      timeout: 5s
      retries: 20
    volumes:
      - saga-db-test-data:/var/lib/postgresql/data

volumes:
  saga-db-test-data:
