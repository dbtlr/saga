services:
  migrate:
    build:
      context: .
      dockerfile: apps/service/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SAGA_DATABASE_URL: postgres://saga:saga@postgres:5432/saga
      SAGA_ENV: production
      SAGA_LOG_LEVEL: info
    command: ['node', '--import', 'tsx', 'src/migrate.ts']
    restart: 'no'

  saga-service:
    build:
      context: .
      dockerfile: apps/service/Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      SAGA_DATABASE_URL: postgres://saga:saga@postgres:5432/saga
      SAGA_ENV: production
      SAGA_LOG_LEVEL: info
      SAGA_SERVICE_HOST: 0.0.0.0
      SAGA_SERVICE_PORT: '4766'
      # In-container 0.0.0.0 is required for the port publish; the publish
      # below (host loopback only) is the actual exposure boundary.
      SAGA_SERVICE_UNSAFE_ALLOW_NONLOOPBACK: '1'
    ports:
      - '127.0.0.1:4766:4766'

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: saga
      POSTGRES_PASSWORD: saga
      POSTGRES_USER: saga
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U saga -d saga']
      interval: 2s
      timeout: 5s
      retries: 20
    volumes:
      - saga-service-postgres-data:/var/lib/postgresql/data

volumes:
  saga-service-postgres-data:
